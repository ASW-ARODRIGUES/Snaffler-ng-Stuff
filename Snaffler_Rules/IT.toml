[[ClassifierRules]]
EnumerationScope = "ContentsEnumeration"
RuleName = "IT Credential Context"
Description = "IT keyword near credential indicators"
MatchAction = "Snaffle"
MatchLocation = "FileContentAsString"
WordListType = "Regex"
WordList = [
    "(?i)\\bIT\\b.{0,80}\\b(password|passwd|pwd|secret|credential|login|username)\\b",
    "(?i)\\b(password|passwd|pwd|secret|credential|login|username)\\b.{0,80}\\bIT\\b"
]
CaseSensitive = false
Triage = "Red"