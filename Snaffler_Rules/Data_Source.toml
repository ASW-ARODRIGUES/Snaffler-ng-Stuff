RuleName = "Data Source Keyword Match"
Description = "Detect password keyword in file content"
MatchAction = "Snaffle"
MatchLocation = "FileContentAsString"
WordListType = "Regex"
WordList = [
    "Data.*Source=",
]
CaseSensitive = false
Triage = "Red"
