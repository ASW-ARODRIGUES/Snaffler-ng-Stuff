[[ClassifierRules]]
EnumerationScope = "ContentsEnumeration"
RuleName = "Credential Fields"
Description = "Detect username and password fields"
MatchAction = "Snaffle"
MatchLocation = "FileContentAsString"
WordListType = "Regex"
WordList = [
    "(?i)(user(?:name)?|userid|user_id|login|account)\\s*[:=]",
    "(?i)(password|passwd|pwd)\\s*[:=]"
]
CaseSensitive = false
Triage = "Red"